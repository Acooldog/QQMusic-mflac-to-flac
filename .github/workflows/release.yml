name: Build and Release

on:
  push:
    branches: [master, master-console]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Build with PyInstaller (onedir)
        shell: pwsh
        run: |
          $entryFile = @("main.py", "app.py", "run.py") | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $entryFile) {
            $firstPy = Get-ChildItem -Filter *.py | Select-Object -First 1
            if (-not $firstPy) {
              throw "未找到 Python 入口文件"
            }
            $entryFile = $firstPy.Name
          }

          Write-Host "Building from entry file: $entryFile"
          pyinstaller --clean --noconfirm --onedir --name "QQMusic-mflac-to-flac" "$entryFile"

      - name: Create release package
        shell: pwsh
        run: |
          $releaseDir = "release"
          $distAppDir = "dist/QQMusic-mflac-to-flac"
          $tempDir = "temp_release"

          if (-not (Test-Path $distAppDir)) {
            throw "构建目录不存在: $distAppDir"
          }

          if (Test-Path $releaseDir) {
            Remove-Item $releaseDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $releaseDir | Out-Null

          if (Test-Path $tempDir) {
            Remove-Item $tempDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $tempDir | Out-Null

          Copy-Item $distAppDir -Destination "$tempDir/QQMusic-mflac-to-flac" -Recurse -Force

          if (Test-Path "README.md") {
            Copy-Item "README.md" -Destination "$tempDir/README.md" -Force
          }
          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" -Destination "$tempDir/LICENSE" -Force
          }

          Compress-Archive -Path "$tempDir/*" -DestinationPath "$releaseDir/QQMusic-mflac-to-flac.zip" -Force
          Remove-Item $tempDir -Recurse -Force

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.sha }}
          path: release/QQMusic-mflac-to-flac.zip
          retention-days: 5

      - name: Install semantic-release dependencies
        shell: pwsh
        run: |
          npm install --no-save semantic-release@24 @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/github conventional-changelog-conventionalcommits

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
