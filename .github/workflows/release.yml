name: Build and Release

on:
  push:
    branches: [develop, master, master-console]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Build with PyInstaller (onedir, noconsole)
        shell: pwsh
        run: |
          $entryFile = @("main.py", "app.py", "run.py") | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $entryFile) {
            $firstPy = Get-ChildItem -Filter *.py | Select-Object -First 1
            if (-not $firstPy) {
              throw "No Python entry file found"
            }
            $entryFile = $firstPy.Name
          }

          Write-Host "Building from entry file: $entryFile"
          pyinstaller --clean --noconfirm --onedir --noconsole --name "QQMusic-mflac-to-flac" "$entryFile"

      - name: Create release package
        shell: pwsh
        run: |
          $releaseDir = "release"
          $distAppDir = "dist/QQMusic-mflac-to-flac"
          $tempDir = "temp_release"

          if (-not (Test-Path $distAppDir)) {
            throw "Build directory not found: $distAppDir"
          }

          if (Test-Path $releaseDir) {
            Remove-Item $releaseDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $releaseDir | Out-Null

          if (Test-Path $tempDir) {
            Remove-Item $tempDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $tempDir | Out-Null

          Copy-Item $distAppDir -Destination "$tempDir/QQMusic-mflac-to-flac" -Recurse -Force

          if (Test-Path "README.md") {
            Copy-Item "README.md" -Destination "$tempDir/README.md" -Force
          }
          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" -Destination "$tempDir/LICENSE" -Force
          }

          Compress-Archive -Path "$tempDir/*" -DestinationPath "$releaseDir/QQMusic-mflac-to-flac.zip" -Force
          Remove-Item $tempDir -Recurse -Force

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.sha }}
          path: release/QQMusic-mflac-to-flac.zip
          retention-days: 5

  semantic-release:
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/master-console'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build-${{ github.sha }}
          path: release

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install semantic-release dependencies
        run: |
          npm install --no-save semantic-release@24 \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/github \
            conventional-changelog-conventionalcommits

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
